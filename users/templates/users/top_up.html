{% extends 'chipin/base.html' %}
{% block title %}Top Up Balance{% endblock %}
{% block content %}
    <h1>Top Up Your Balance</h1>
    <p>Your current balance is: ${{ balance }}</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Top Up</button>
    </form>
{% endblock %}
